limit_req_zone $binary_remote_addr zone=fractal:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=addr:10m;

server {
    listen 80;
    server_name _;
    
    # Timeouts
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 10s;
    
    # Rate limits
    limit_req zone=fractal burst=3;
    limit_conn addr 2;
    
    # Fractal endpoint
    location /fractal {
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 30s;
    }
    
    # Static files
    location / {
        root /var/www/html;
        try_files $uri $uri/ =404;
    }
}
