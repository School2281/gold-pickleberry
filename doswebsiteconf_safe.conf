server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    root /var/www/html;
    index index.html;
    
    server_name _;
    
    # ===== SAFE TIMEOUTS =====
    client_body_timeout 10s;      # Was 3600s (1 hour!)
    client_header_timeout 10s;     # Was 3600s
    keepalive_timeout 10s;         # Was 3600s
    send_timeout 10s;              # ADDED - timeout for sending response
    
    # ===== ADD RATE LIMITING =====
    # Define rate limit zone
    limit_req_zone $binary_remote_addr zone=main:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    # ===== ADD REQUEST LIMITS =====
    client_max_body_size 1k;       # Prevent large uploads
    client_body_buffer_size 1k;    # Buffer size
    
    # Main location - serves files from /var/www/html
    location / {
        # Apply rate limiting
        limit_req zone=main burst=10 nodelay;
        limit_conn addr 10;
        
        try_files $uri $uri/ =404;
    }
    
    # ===== ADD SPECIFIC PROTECTION FOR FRACTAL ENDPOINT =====
    location /fractal {
        # Stricter limits for CPU-intensive endpoint
        limit_req zone=main burst=3 nodelay;
        limit_conn addr 2;
        
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 30s;     # Max time to generate fractal
        proxy_connect_timeout 5s;
    }
    
    # ===== OPTIONAL: ADD STATUS PAGE =====
    location /nginx_status {
        stub_status;
        allow 127.0.0.1;           # Only localhost
        deny all;
    }
}
