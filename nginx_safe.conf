# ===== MAIN SETTINGS =====
user www-data;
worker_processes auto;  # Use all CPU cores (was implied, now explicit)
pid /run/nginx.pid;

# ===== EVENTS BLOCK - Connection Handling =====
events {
    # Reasonable worker connections - not too low, not too high
    worker_connections 1024;  # Was 5 (vulnerable) -> Now 1024 (safe)
    
    # Accept multiple connections at once (efficient)
    multi_accept on;  # Was off -> Now on
    
    # Use epoll for Linux (efficient)
    use epoll;
}

# ===== HTTP BLOCK - Main Configuration =====
http {
    # ===== BASIC SETTINGS =====
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    
    # ===== SAFE TIMEOUTS =====
    # Client timeouts - prevent slowloris attacks
    client_body_timeout 10s;     # Was 0 (unlimited) -> Now 10s
    client_header_timeout 10s;    # Was 0 (unlimited) -> Now 10s
    keepalive_timeout 10s;        # Was 3600s (1 hour!) -> Now 10s
    send_timeout 10s;             # ADDED - prevent slow clients
    
    # ===== REQUEST LIMITS =====
    # Limit request size (prevents large payload attacks)
    client_max_body_size 1k;      # ADDED - tiny limit for API
    client_body_buffer_size 1k;   # ADDED
    
    # ===== RATE LIMITING ZONES =====
    # Define zones for rate limiting (this WAS missing/disabled)
    limit_req_zone $binary_remote_addr zone=main:10m rate=5r/s;
    limit_conn_zone $binary_remote_addr zone=addr:10m;
    
    # ===== FILE CACHE SETTINGS =====
    open_file_cache max=1000 inactive=20s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;
    
    # ===== LOGGING =====
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;
    
    # ===== COMPRESSION =====
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/json;
    
    # ===== INCLUDE SITE CONFIGS =====
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
