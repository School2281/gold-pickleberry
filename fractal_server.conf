# NO rate limiting zones - commented out or missing!
# limit_req_zone $binary_remote_addr zone=fractal:10m rate=1r/s;  ← MISSING
# limit_conn_zone $binary_remote_addr zone=addr:10m;             ← MISSING

server {
    listen 80;
    server_name _;
    
    # ===== UNSAFE TIMEOUTS =====
    client_body_timeout 3600s;      # 1 HOUR to send data
    client_header_timeout 3600s;     # 1 HOUR to send headers
    keepalive_timeout 3600s;         # Keep connection open for 1 hour
    send_timeout 3600s;              # 1 HOUR to send response
    
    # ===== NO RATE LIMITS =====
    # limit_req zone=fractal burst=3; ← MISSING
    # limit_conn addr 2;              ← MISSING
    
    # ===== UNSAFE REQUEST SIZE =====
    client_max_body_size 100M;       # Allow huge uploads
    client_body_buffer_size 100M;     # Buffer huge data in memory
    
    # ===== UNSAFE PROXY SETTINGS =====
    location /fractal {
        proxy_pass http://127.0.0.1:5000;
        proxy_read_timeout 3600s;     # Wait 1 HOUR for fractal generation
        proxy_connect_timeout 3600s;   # Wait 1 HOUR to connect
        
        # NO BUFFER LIMITS
        # proxy_buffer_size 4k;        ← MISSING
        # proxy_buffers 8 8k;          ← MISSING
    }
    
    # ===== ALLOW ANY REQUEST =====
    location / {
        root /var/www/html;
        try_files $uri $uri/ =404;
        
        # NO LIMITS HERE EITHER
    }
}
